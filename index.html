<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Will you marry me?</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background:#ffe6f0;
  overflow:hidden;
  text-align:center;
}

.scene{
  display:none;
  height:100vh;
  align-items:center;
  justify-content:center;
  flex-direction:column;
}

.active{
  display:flex;
}

h1{
  color:#ff4d88;
}

button{
  padding:15px 25px;
  font-size:20px;
  margin:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

#yes{
  background:#4CAF50;
  color:white;
}

#no{
  background:#f44336;
  color:white;
  position:absolute;
}

.heart{
  position:absolute;
  color:pink;
  font-size:20px;
  animation: float 4s linear infinite;
}

@keyframes float{
  from{transform:translateY(100vh); opacity:1;}
  to{transform:translateY(-10vh); opacity:0;}
}
</style>
</head>

<body>

<!-- SCENE 1 -->
<div class="scene active" id="s1">
  <h1>WILL YOU MARRY ME? 💍</h1>
  <div>
    <button id="yes1">YES 💖</button>
    <button id="no">NO 💔</button>
  </div>
</div>

<!-- SCENE 2 -->
<div class="scene" id="s2">
  <h1>ARE YOU SURE? 😭</h1>
  <button onclick="goYes()">YES 💖</button>
  <button onclick="goNo()">NO 💔</button>
</div>

<!-- SCENE 3 -->
<div class="scene" id="s3">
  <h1>OK... LAST CHANCE 😏</h1>
  <button onclick="finalYes()">YES 💖</button>
</div>

<!-- FINAL -->
<div class="scene" id="final">
  <h1>YES × YES FOREVER 💍💖</h1>
  <h2>YOU MADE MY HEART WIN 😭💕</h2>
</div>

<script>

let noBtn = document.getElementById("no");
let clicks = 0;

// هروب NO
noBtn.addEventListener("mouseover", ()=>{
  clicks++;

  let x = Math.random() * window.innerWidth;
  let y = Math.random() * window.innerHeight;

  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";

  // بعد شوية يتحول ل YES
  if(clicks > 6){
    noBtn.innerText = "YES 💖";
    noBtn.style.background = "#4CAF50";
    noBtn.onclick = goYes;
  }
});

// انتقال بين المشاهد
function goYes(){
  document.getElementById("s1").classList.remove("active");
  document.getElementById("s2").classList.add("active");
}

function goNo(){
  document.getElementById("s2").classList.remove("active");
  document.getElementById("s3").classList.add("active");
}

function finalYes(){
  document.getElementById("s3").classList.remove("active");
  document.getElementById("final").classList.add("active");
  makeHearts();
}

// قلوب طايرة 💖
function makeHearts(){
  for(let i=0;i<30;i++){
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "💖";
    heart.style.left = Math.random()*100 + "vw";
    heart.style.fontSize = (10 + Math.random()*30) + "px";
    heart.style.animationDuration = (2 + Math.random()*3) + "s";
    document.body.appendChild(heart);
  }
}

</script>

</body>
</html>
