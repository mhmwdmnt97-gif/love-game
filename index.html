<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Will you marry me?</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#ffe6f0,#fff0f5);
  overflow:hidden;
  text-align:center;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

h1{
  color:#ff4d88;
  margin-bottom:40px;
}

#yes{
  padding:15px 30px;
  font-size:20px;
  border:none;
  border-radius:12px;
  background:#4CAF50;
  color:white;
  cursor:pointer;
  position:relative;
  z-index:10;
}

#no{
  padding:15px 30px;
  font-size:20px;
  border:none;
  border-radius:12px;
  background:#f44336;
  color:white;
  cursor:pointer;
  position:absolute;
  transition:0.2s;
}

.heart{
  position:absolute;
  color:pink;
  font-size:20px;
  animation: float 4s linear infinite;
}

@keyframes float{
  from{transform:translateY(100vh); opacity:1;}
  to{transform:translateY(-10vh); opacity:0;}
}
</style>
</head>

<body>

<h1>WILL YOU MARRY ME? 💍</h1>

<button id="yes" onclick="yesClick()">YES 💖</button>
<button id="no">NO 💔</button>

<script>

let noBtn = document.getElementById("no");
let yesBtn = document.getElementById("yes");
let clicks = 0;

// 💔 NO بيهرب
noBtn.addEventListener("mouseover", ()=>{
  clicks++;

  let x = Math.random() * (window.innerWidth - 100);
  let y = Math.random() * (window.innerHeight - 100);

  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";

  if(clicks > 6){
    noBtn.innerText = "OK FINE... YES 💖";
    noBtn.style.background = "#4CAF50";
    noBtn.onclick = yesClick;
  }
});

// 💖 YES
function yesClick(){
  document.body.innerHTML = "<h1>YES × YES FOREVER 💍💖</h1><h2>YOU GOT ME 😭💕</h2>";
  makeHearts();
}

// 💖 قلوب
function makeHearts(){
  for(let i=0;i<40;i++){
    let h = document.createElement("div");
    h.className = "heart";
    h.innerHTML = "💖";
    h.style.left = Math.random()*100 + "vw";
    h.style.fontSize = (10 + Math.random()*30) + "px";
    h.style.animationDuration = (2 + Math.random()*3) + "s";
    document.body.appendChild(h);
  }
}

</script>

</body>
</html>
